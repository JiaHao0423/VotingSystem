spring.application.name=backend

spring.config.import=optional:classpath:application-local.properties

# MySQL datasourceпјҲж”ҜжҸҙ SPRING_DATASOURCE_* жҲ– MYSQL_* з’°еўғи®Ҡж•ёпјү
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:voting_system}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:0000}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Admin APIпјҲйҰ–ж¬Ўе•ҹеӢ•жҷӮе»әз«Ӣи¶…зҙҡз®ЎзҗҶе“Ўпјү
spring.security.user.name=${SPRING_SECURITY_USER_NAME:${ADMIN_USERNAME:admin}}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:${ADMIN_PASSWORD:admin}}
spring.security.user.roles=ADMIN

# Voter frontend base URL for QR links
app.voter-base-url=${APP_VOTER_BASE_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Voter session (4 hours вҖ” covers typical еҚҖж¬Ҡжңғ duration)
server.servlet.session.timeout=4h
server.servlet.session.cookie.same-site=lax
server.port=${PORT:8081}