spring.application.name=backend

spring.config.import=optional:classpath:application-local.properties

# MySQL datasource (override via application-local.properties or env vars)
spring.datasource.url=jdbc:mysql://localhost:3306/voting_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:0000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Admin API (Phase 1 dev defaults — change in production)
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# Voter frontend base URL for QR links
app.voter-base-url=http://localhost:5173
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Voter session (4 hours — covers typical 區權會 duration)
server.servlet.session.timeout=4h
server.servlet.session.cookie.same-site=lax
server.port=8081