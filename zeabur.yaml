# Zeabur 部署範本（PREBUILT 自訂 Docker 映像）
# 使用方式：先執行 GitHub Actions 將映像推送到 GHCR，再在 Zeabur 匯入此範本
# 文件：https://zeabur.com/docs/en-US/deploy/methods/custom-docker-image
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: VotingSystem
spec:
  description: 社區投票系統（前後端整合映像）
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: 網域
      description: 投票系統對外網域
    - key: MYSQL_HOST
      type: STRING
      name: MySQL Host
      description: 例如 43.167.159.126
    - key: MYSQL_PORT
      type: STRING
      name: MySQL Port
      description: 例如 32135
    - key: MYSQL_DATABASE
      type: STRING
      name: MySQL Database
      description: 例如 zeabur
    - key: MYSQL_USER
      type: STRING
      name: MySQL User
      description: 例如 root
    - key: MYSQL_PASSWORD
      type: STRING
      name: MySQL Password
      description: MySQL 密碼
    - key: ADMIN_USERNAME
      type: STRING
      name: 超級管理員帳號
      description: 首次啟動時建立（資料庫無管理員時）
    - key: ADMIN_PASSWORD
      type: STRING
      name: 超級管理員密碼
      description: 首次啟動時建立（資料庫無管理員時）
    - key: GHCR_IMAGE
      type: STRING
      name: Docker 映像
      description: 必須全小寫，例如 ghcr.io/jiahao0423/votingsystem:latest
  services:
    - name: VotingSystem
      template: PREBUILT
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: ${GHCR_IMAGE}
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          SPRING_DATASOURCE_URL:
            default: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
          SPRING_DATASOURCE_USERNAME:
            default: ${MYSQL_USER}
          SPRING_DATASOURCE_PASSWORD:
            default: ${MYSQL_PASSWORD}
          SPRING_SECURITY_USER_NAME:
            default: ${ADMIN_USERNAME}
          SPRING_SECURITY_USER_PASSWORD:
            default: ${ADMIN_PASSWORD}
          APP_VOTER_BASE_URL:
            default: https://${PUBLIC_DOMAIN}
          APP_CORS_ALLOWED_ORIGINS:
            default: https://${PUBLIC_DOMAIN}
          PORT:
            default: "8080"
