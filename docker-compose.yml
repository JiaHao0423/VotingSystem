services:
  app:
    build: .
    container_name: voting-app
    restart: unless-stopped
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_SECURITY_USER_NAME: ${ADMIN_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${ADMIN_PASSWORD}
      APP_VOTER_BASE_URL: ${VOTER_BASE_URL}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "${FRONTEND_PORT}:8080"
