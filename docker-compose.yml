services:
  backend:
    build: ./backend
    container_name: voting-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_SECURITY_USER_NAME: ${ADMIN_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${ADMIN_PASSWORD}
      APP_VOTER_BASE_URL: ${VOTER_BASE_URL}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SPRING_JPA_SHOW_SQL: "false"

  frontend:
    build: ./frontend
    container_name: voting-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 80
      BACKEND_URL: http://backend:8081
    ports:
      - "${FRONTEND_PORT}:80"
